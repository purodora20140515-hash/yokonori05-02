<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第5期Z式プロドラ横乗りインストラクター養成講座 2月期振り返りテスト</title>
    
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            margin: 0; padding: 0; line-height: 1.6;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333; min-height: 100vh;
        }

        .container {
            max-width: 850px; margin: 30px auto; padding: 30px;
            background-color: #fff; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        h1 {
            color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db;
            padding-bottom: 15px; margin-bottom: 30px; font-size: 1.6em;
        }
        
        .question-block {
            margin-bottom: 30px; padding: 20px;
            border: 1px solid #e0e6ed; border-radius: 8px;
            background-color: #fcfdfe;
        }
        
        .category-tag {
            display: inline-block; padding: 2px 10px; border-radius: 4px;
            background-color: #3498db; color: #fff; font-size: 0.8em;
            margin-bottom: 10px; font-weight: bold;
        }

        .question-text { font-weight: bold; margin-bottom: 15px; display: block; }
        
        input[type="text"] {
            padding: 10px; border: 2px solid #bdc3c7; border-radius: 6px;
            width: 80%; max-width: 300px; font-size: 1em;
        }

        .choice-group { display: flex; gap: 20px; margin-top: 10px; }
        .choice-group label {
            padding: 10px 30px; border: 2px solid #bdc3c7; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .choice-group input[type="radio"] { display: none; }
        .choice-group input[type="radio"]:checked + label {
            background-color: #3498db; color: white; border-color: #2980b9;
        }

        button {
            display: block; width: 100%; max-width: 300px; margin: 20px auto;
            padding: 15px; border: none; border-radius: 30px;
            font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        #checkBtn { background-color: #e67e22; color: white; }
        #checkBtn:hover { background-color: #d35400; }
        #printBtn { background-color: #27ae60; color: white; display: none; }

        .feedback { margin-top: 10px; font-weight: bold; min-height: 1.2em; }
        .correct { color: #27ae60; }
        .incorrect { color: #e74c3c; }

        .result-summary {
            text-align: center; padding: 20px; background-color: #ecf0f1;
            border-radius: 10px; display: none; margin-top: 30px;
        }

        @media print {
            body { background: none; }
            .container { box-shadow: none; border: none; width: 100%; margin: 0; padding: 0; }
            button, .feedback, .result-summary { display: none !important; }
            .question-block { page-break-inside: avoid; border: 1px solid #ccc; margin-bottom: 20px; }
            input[type="text"] { border: none; border-bottom: 1px solid #000; }
            .choice-group label { border: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>プロドラ横乗りインストラクター養成講座<br>2月期振り返りテスト（全10問）</h1>

    <div id="quiz-area"></div>

    <button id="checkBtn" onclick="judge()">解答を判定する</button>
    
    <div id="resultSummary" class="result-summary"></div>
    <button id="printBtn" onclick="window.print()">結果をPDF保存・印刷する</button>
</div>

<script>
const quizData = [
    { cat: "指導実践講座～運転スキルチェック", q: "トラックのように運転席の位置が高いと、車間距離が長く感じ、普通車のように運転席が低いと車間距離が短く感じる。", type: "ox", a: "〇" },
    { cat: "指導実践講座～運転スキルチェック", q: "時速40キロで走るトラックで、荷台に3キロの荷物を載せている時となにも載せていない状態では制動距離は変わる。",  type: "ox", a: "×" },
    { cat: "労務基礎知識", q: "トラックドライバーの労働条件の向上を図るため、厚生労働大臣によって定められた、拘束時間・休息時間・運転時間等の基準を何と呼びますか。", type: "text", a: "改善基準告示" },
    { cat: "労務基礎知識", q: "（　　）の中に入る言葉を答えましょう。職場における「パワーハラスメント」の定義とは、1．優越的な関係を背景とした言動であること。2．業務上必要かつ相当な範囲を超えたものであること。3．労働者の(　　）が害されるものであることをいう。", type: "text", a: "就業環境" },
    { cat: "トラックの構造と点検", q: "エンジンオイルの役割には防錆・洗浄・冷却・密封・緩衝の他に何があるでしょう。", type: "text", a: "潤滑" },
    { cat: "トラックの構造と点検", q: "日本のトラックは右後輪のタイヤが外れやすい。〇か×か", type: "ox", a: "×" },
    { cat: "トラックの構造と点検", q: "方向指示器（ウィンカー）は橙色で昼間１００ｍの距離から点灯を確認できるもので、点滅回数は毎分（　　）回以下であること。", type: "text", a: "60～120" },
];

function init() {
    const area = document.getElementById('quiz-area');
    quizData.forEach((item, i) => {
        let inputHtml = item.type === "text" 
            ? `<input type="text" id="ans${i}" placeholder="答えを入力">`
            : `<div class="choice-group">
                <input type="radio" name="radio${i}" id="ox${i}_1" value="〇"><label for="ox${i}_1">〇 正解</label>
                <input type="radio" name="radio${i}" id="ox${i}_2" value="×"><label for="ox${i}_2">× 不正解</label>
               </div>`;
        
        area.innerHTML += `
            <div class="question-block">
                <span class="category-tag">${item.cat}</span>
                <span class="question-text">問${i+1}. ${item.q}</span>
                ${inputHtml}
                <div id="feedback${i}" class="feedback"></div>
            </div>`;
    });
}

function judge() {
    let score = 0;
    quizData.forEach((item, i) => {
        let userAns = "";
        if (item.type === "text") {
            userAns = document.getElementById(`ans${i}`).value.trim();
        } else {
            const selected = document.querySelector(`input[name="radio${i}"]:checked`);
            userAns = selected ? selected.value : "";
        }

        const feedback = document.getElementById(`feedback${i}`);
        if (userAns === item.a) {
            score++;
            feedback.innerHTML = `<span class="correct">✓ 正解</span>`;
        } else {
            feedback.innerHTML = `<span class="incorrect">× 不正解（正解：${item.a}）</span>`;
        }
    });

    const summary = document.getElementById('resultSummary');
    summary.style.display = "block";
    summary.innerHTML = `<h3>テスト完了</h3><p>正解数：${score} / ${quizData.length}</p>`;
    document.getElementById('printBtn').style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

init();
</script>
</body>
</html>
